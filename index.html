<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BRENDA — Tu Coach de Fitness con IA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF3C78;
  --pink2: #FF6B9D;
  --pink-dim: rgba(255,60,120,0.12);
  --gold: #E8B84B;
  --gold-dim: rgba(232,184,75,0.12);
  --dark: #080610;
  --dark2: #0F0C1A;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0EBF8;
  --muted: rgba(240,235,248,0.45);
  --green: #00E5A0;
  --r: 16px;
  --r2: 24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:.18;animation:orb-drift 12s ease-in-out infinite alternate}
.orb-1{width:500px;height:500px;background:var(--pink);top:-150px;right:-100px;animation-duration:10s}
.orb-2{width:400px;height:400px;background:var(--gold);bottom:-100px;left:-100px;animation-duration:14s;animation-delay:-5s}
.orb-3{width:300px;height:300px;background:#8B5CF6;top:40%;left:20%;animation-duration:16s;animation-delay:-3s;opacity:.1}
@keyframes orb-drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.1)}}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;min-height:100vh;padding:0 0 40px;animation:fade-in .5s ease}
.screen.active{display:flex}
@keyframes fade-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* WELCOME */
#screen-welcome{align-items:center;justify-content:center;text-align:center;padding:48px 28px}
.welcome-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--pink2);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px}
.welcome-eyebrow::before,.welcome-eyebrow::after{content:'';display:block;width:30px;height:1px;background:var(--pink2);opacity:.4}
.welcome-title{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:700;line-height:.92;letter-spacing:-2px;margin-bottom:8px}
.welcome-title span{font-style:italic;background:linear-gradient(135deg,var(--pink) 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-sub{font-size:15px;color:var(--muted);line-height:1.6;margin:20px 0 40px;max-width:300px}
.avatar-ring{width:100px;height:100px;border-radius:50%;border:2px solid transparent;background:linear-gradient(var(--dark2),var(--dark2)) padding-box,linear-gradient(135deg,var(--pink),var(--gold)) border-box;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 28px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ONBOARDING */
#screen-onboard{padding:0}
.onboard-header{padding:52px 28px 28px}
.step-indicator{display:flex;gap:6px;margin-bottom:32px}
.step-dot{height:3px;border-radius:3px;background:var(--border2);transition:all .4s ease;flex:1}
.step-dot.active{background:var(--pink)}
.step-dot.done{background:var(--green)}
.onboard-q{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;line-height:1.1;margin-bottom:8px}
.onboard-q em{font-style:italic;color:var(--pink2)}
.onboard-hint{font-size:13px;color:var(--muted)}
.onboard-body{padding:0 28px;flex:1}
.onboard-footer{padding:24px 28px 0}
.choice-grid{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.choice-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
.choice-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pink-dim),transparent);opacity:0;transition:opacity .25s}
.choice-card:hover{border-color:var(--border2);transform:translateX(4px)}
.choice-card.selected{border-color:var(--pink);background:var(--pink-dim)}
.choice-card.selected::before{opacity:1}
.choice-icon{font-size:28px;flex-shrink:0}
.choice-text{flex:1}
.choice-title{font-size:15px;font-weight:600;margin-bottom:2px}
.choice-desc{font-size:12px;color:var(--muted)}
.choice-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .25s}
.choice-card.selected .choice-check{background:var(--pink);border-color:var(--pink);color:white}
.slider-group{margin-top:28px}
.slider-val{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:700;text-align:center;line-height:1;margin-bottom:4px}
.slider-val span{font-size:20px;color:var(--muted);margin-left:4px}
.slider-unit{text-align:center;font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--pink) var(--pct,50%),var(--border2) var(--pct,50%))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:white;box-shadow:0 0 0 4px var(--pink-dim),0 2px 8px rgba(0,0,0,.4);transition:box-shadow .2s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 8px var(--pink-dim),0 2px 8px rgba(0,0,0,.4)}
.text-input{width:100%;margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:18px;font-weight:500;padding:18px 20px;outline:none;transition:border-color .2s}
.text-input:focus{border-color:var(--pink)}
.text-input::placeholder{color:var(--muted)}

/* BUTTONS */
.btn{width:100%;padding:18px;border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-primary{background:linear-gradient(135deg,var(--pink) 0%,#C4185B 100%);color:white;box-shadow:0 8px 32px rgba(255,60,120,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,60,120,.45)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,#C8922B 100%);color:#1A0F00;box-shadow:0 8px 32px rgba(232,184,75,.3)}

/* APP */
#screen-app{padding:0}
.top-nav{padding:52px 24px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.nav-greeting{font-size:12px;color:var(--muted);margin-bottom:2px;letter-spacing:.5px}
.nav-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700}
.nav-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--gold));display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.streak-bar{margin:0 24px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 20px;display:flex;align-items:center;gap:16px}
.streak-fire{font-size:32px;flex-shrink:0}
.streak-info{flex:1}
.streak-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--gold),#E8722B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.streak-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.week-dots{display:flex;gap:5px}
.week-dot{width:28px;height:28px;border-radius:50%;background:var(--border);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;transition:all .3s}
.week-dot.done{background:var(--pink-dim);border-color:var(--pink);color:var(--pink2)}
.week-dot.today{border-color:var(--gold)}
.sec-label{padding:0 24px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,6,16,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:50;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;cursor:pointer;transition:all .2s;color:var(--muted);font-size:10px;letter-spacing:.5px;border:none;background:none}
.tab-icon{font-size:20px;transition:transform .2s}
.tab-item.active{color:var(--pink)}
.tab-item.active .tab-icon{transform:scale(1.15)}
.tab-content{display:none;padding-bottom:90px}
.tab-content.active{display:block;animation:fade-in .35s ease}

/* BRENDA/CHAT */
.brenda-hero{margin:0 24px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px;position:relative;overflow:hidden}
.brenda-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pink),var(--gold),transparent)}
.brenda-avatar-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.brenda-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pink) 0%,var(--gold) 100%);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative}
.brenda-online{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--dark2);animation:pulse-green 2s ease-in-out infinite}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.4)}50%{box-shadow:0 0 0 6px rgba(0,229,160,0)}}
.brenda-name{font-weight:600;font-size:15px}
.brenda-role{font-size:12px;color:var(--muted)}
.brenda-msg{font-size:14px;line-height:1.6;color:var(--muted);font-style:italic}
.brenda-msg strong{color:var(--text);font-style:normal;font-weight:600}
.chat-wrap{margin:0 24px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6;animation:bubble-in .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bubble-in{from{transform:scale(.8) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.bubble-brenda{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
.bubble-user{background:linear-gradient(135deg,var(--pink),#C4185B);color:white;border-bottom-right-radius:4px;align-self:flex-end}
.bubble-typing{display:flex;align-items:center;gap:5px;padding:14px 18px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:typing-bounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}
.chat-input-row{margin:16px 24px 0;display:flex;gap:10px}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:50px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 18px;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--pink)}
.chat-input::placeholder{color:var(--muted)}
.chat-send{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#C4185B);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;box-shadow:0 4px 16px rgba(255,60,120,.3);flex-shrink:0}
.chat-send:hover{transform:scale(1.08)}
.chat-send:active{transform:scale(.95)}

/* WORKOUT */
.plan-card{margin:0 24px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.plan-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.plan-card.featured{background:linear-gradient(135deg,rgba(255,60,120,.08),rgba(232,184,75,.05));border-color:rgba(255,60,120,.25)}
.plan-card.featured::before{content:'HOY';position:absolute;top:16px;right:16px;background:var(--pink);color:white;font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:20px}
.plan-day{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.plan-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;margin-bottom:10px}
.plan-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted)}
.tag.pink{background:var(--pink-dim);border-color:rgba(255,60,120,.25);color:var(--pink2)}
.exercise-list{display:flex;flex-direction:column;gap:8px}
.exercise-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:var(--r)}
.ex-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--pink);font-weight:700;width:20px;flex-shrink:0}
.ex-info{flex:1}
.ex-name{font-size:13px;font-weight:500}
.ex-sets{font-size:11px;color:var(--muted);margin-top:1px}
.ex-icon-r{font-size:18px}
.gen-btn{margin:0 24px 14px;padding:16px 20px;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r2);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .25s;color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;width:calc(100% - 48px);text-align:left}
.gen-btn:hover{border-color:var(--pink);color:var(--text);background:var(--pink-dim)}
.gen-icon{font-size:24px}

/* MEALS */
.meal-macros{margin:0 24px 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.macro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center}
.macro-num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;margin-bottom:2px}
.macro-num.pink{color:var(--pink)}
.macro-num.gold{color:var(--gold)}
.macro-num.green{color:var(--green)}
.macro-num.blue{color:#6BBFFF}
.macro-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.meal-card{margin:0 24px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;transition:all .2s}
.meal-card:hover{border-color:var(--border2)}
.meal-time{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.meal-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;margin-bottom:8px}
.meal-items{font-size:13px;color:var(--muted);line-height:1.7}
.meal-cals{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.meal-cals-num{font-family:'Space Mono',monospace;font-size:15px;color:var(--gold);font-weight:700}

/* LOADING */
#global-loading{position:fixed;inset:0;z-index:200;background:rgba(8,6,16,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:40px}
#global-loading.active{display:flex}
.loading-brenda{font-size:60px;animation:float 2s ease-in-out infinite}
.loading-ring{width:60px;height:60px;border:3px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;color:var(--muted);max-width:240px;line-height:1.6}
.loading-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;font-style:italic}

/* TOAST */
#error-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#2A1020;border:1px solid rgba(255,60,120,.4);border-radius:var(--r);padding:12px 20px;font-size:13px;color:var(--pink2);max-width:340px;text-align:center;z-index:300;opacity:0;transition:all .3s;pointer-events:none}
#error-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--pink-dim);border-radius:3px}
.shimmer{background:linear-gradient(90deg,var(--surface) 25%,rgba(255,255,255,.06) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r)}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div id="app">

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="avatar-ring">🍑</div>
    <div class="welcome-eyebrow">Tu Coach Personal con IA</div>
    <div class="welcome-title">Meet<br><span>Brenda</span></div>
    <p class="welcome-sub">Planes de entrenamiento y comida personalizados con inteligencia artificial — como la mera Brenda Jazmín.</p>
    <button class="btn btn-primary" onclick="goToOnboarding()" style="max-width:320px">Empecemos 🔥</button>
    <p style="margin-top:16px;font-size:12px;color:var(--muted)">Inspirado por <a href="https://www.instagram.com/brendaa_jazmin/" target="_blank" style="color:var(--pink2);text-decoration:none">@brendaa_jazmin</a></p>
  </div>

  <!-- ONBOARDING -->
  <div id="screen-onboard" class="screen">
    <div class="onboard-header">
      <div class="step-indicator" id="step-indicator"></div>
      <div class="onboard-q" id="onboard-q"></div>
      <div class="onboard-hint" id="onboard-hint"></div>
    </div>
    <div class="onboard-body" id="onboard-body"></div>
    <div class="onboard-footer">
      <button class="btn btn-primary" id="onboard-next" onclick="nextStep()" disabled>Continuar →</button>
      <div style="height:10px"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-app" class="screen">
    <div class="top-nav">
      <div>
        <div class="nav-greeting" id="nav-greeting">Buenos días,</div>
        <div class="nav-name" id="nav-name">Campeona 👋</div>
      </div>
      <div class="nav-avatar" onclick="confirmReset()">🍑</div>
    </div>
    <div class="streak-bar">
      <div class="streak-fire">🔥</div>
      <div class="streak-info">
        <div class="streak-num" id="streak-count">0</div>
        <div class="streak-label">días de racha</div>
      </div>
      <div class="week-dots" id="week-dots"></div>
    </div>
    <div id="tab-home"    class="tab-content active"></div>
    <div id="tab-workout" class="tab-content"></div>
    <div id="tab-meals"   class="tab-content"></div>
    <div id="tab-chat"    class="tab-content"></div>
    <nav class="tab-bar">
      <button class="tab-item active" onclick="switchTab('home',this)"><span class="tab-icon">🏠</span>Home</button>
      <button class="tab-item" onclick="switchTab('workout',this)"><span class="tab-icon">💪</span>Rutina</button>
      <button class="tab-item" onclick="switchTab('meals',this)"><span class="tab-icon">🥗</span>Comida</button>
      <button class="tab-item" onclick="switchTab('chat',this)"><span class="tab-icon">✨</span>Brenda AI</button>
    </nav>
  </div>
</div>

<div id="global-loading">
  <div class="loading-brenda">🍑</div>
  <div class="loading-ring"></div>
  <div class="loading-title" id="loading-title">Brenda está pensando...</div>
  <div class="loading-msg"   id="loading-msg">Personalizando tu plan con IA</div>
</div>
<div id="error-toast"></div>

<script>

function buildStepIndicator() {
  const el = document.getElementById('step-indicator');
  el.innerHTML = '';
  STEPS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    el.appendChild(d);
  });
}
function renderStep() {
  const step = STEPS[currentStep];
  buildStepIndicator();
  document.getElementById('onboard-q').innerHTML    = step.q;
  document.getElementById('onboard-hint').textContent = step.hint;
  const body = document.getElementById('onboard-body');
  const nextBtn = document.getElementById('onboard-next');
  nextBtn.disabled = true; body.innerHTML = '';

  if (step.type === 'choice') {
    const grid = document.createElement('div');
    grid.className = 'choice-grid';
    step.options.forEach(opt => {
      const card = document.createElement('div');
      card.className = 'choice-card' + (onboardAnswers[step.key] === opt.val ? ' selected' : '');
      card.innerHTML = `<div class="choice-icon">${opt.icon}</div><div class="choice-text"><div class="choice-title">${opt.title}</div><div class="choice-desc">${opt.desc}</div></div><div class="choice-check">${onboardAnswers[step.key]===opt.val?'✓':''}</div>`;
      card.onclick = () => {
        onboardAnswers[step.key] = opt.val;
        grid.querySelectorAll('.choice-card').forEach(c => { c.classList.remove('selected'); c.querySelector('.choice-check').textContent=''; });
        card.classList.add('selected'); card.querySelector('.choice-check').textContent='✓';
        nextBtn.disabled = false;
      };
      grid.appendChild(card);
    });
    body.appendChild(grid);
    if (onboardAnswers[step.key] !== undefined) nextBtn.disabled = false;

  } else if (step.type === 'slider') {
    const val = onboardAnswers[step.key] ?? step.default;
    const pct = ((val - step.min) / (step.max - step.min)) * 100;
    body.innerHTML = `<div class="slider-group"><div class="slider-val" id="slider-display">${val}<span>${step.unit}</span></div><div class="slider-unit">${step.key==='weight'?'kilogramos':'años'}</div><input type="range" id="slider-input" min="${step.min}" max="${step.max}" value="${val}" style="--pct:${pct}%" oninput="updateSlider(this,'${step.key}','${step.unit}',${step.min},${step.max})"></div>`;
    onboardAnswers[step.key] = val; nextBtn.disabled = false;

  } else if (step.type === 'text') {
    const inp = document.createElement('input');
    inp.type='text'; inp.className='text-input'; inp.placeholder=step.placeholder; inp.value=onboardAnswers[step.key]||'';
    inp.oninput = () => { onboardAnswers[step.key]=inp.value.trim(); nextBtn.disabled=!inp.value.trim(); };
    if (onboardAnswers[step.key]) nextBtn.disabled = false;
    body.appendChild(inp); setTimeout(()=>inp.focus(),100);
  }
}
function updateSlider(el, key, unit, min, max) {
  const v = parseInt(el.value); onboardAnswers[key] = v;
  document.getElementById('slider-display').innerHTML = `${v}<span>${unit}</span>`;
  el.style.setProperty('--pct', ((v-min)/(max-min)*100)+'%');
}
async function nextStep() {
  if (currentStep < STEPS.length - 1) { currentStep++; renderStep(); }
  else { await finishOnboarding(); }
}

// ─────────────────────────────────────────────────
// CLAUDE API  →  /api/claude  (proxy seguro)
// ─────────────────────────────────────────────────
async function callClaude(userMsg, jsonMode=false, systemExtra='') {
  const system = `Eres Brenda Jazmín, una influencer fitness mexicana motivadora, directa y apasionada.
Tu tono es cálido pero firme — exiges resultados pero con cariño. Usas expresiones mexicanas naturales ocasionalmente.
Siempre das consejos de fitness y nutrición basados en ciencia. Nunca eres condescendiente.
${jsonMode ? 'IMPORTANTE: Responde ÚNICAMENTE con JSON válido. Sin texto extra, sin markdown, sin backticks.' : ''}
${systemExtra}`;

  const messages = jsonMode
    ? [{role:'user',content:userMsg}]
    : [...chatHistory,{role:'user',content:userMsg}];

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: MODEL, max_tokens: 1500, system, messages }),
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      console.error('API error:', res.status, err);
      showToast('⚠️ Error con la IA. Revisa tu API key en Vercel → Environment Variables.');
      return null;
    }
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    if (!jsonMode) {
      chatHistory.push({role:'user',content:userMsg});
      chatHistory.push({role:'assistant',content:text});
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }
    return text;
  } catch(e) {
    console.error('Fetch error:', e);
    showToast('Sin conexión. Verifica tu internet e intenta de nuevo.');
    return null;
  }
}

function safeParseJSON(raw) {
  if (!raw) return null;
  try {
    const clean = raw.replace(/^```json\s*/i,'').replace(/^```/,'').replace(/```\s*$/,'').trim();
    return JSON.parse(clean);
  } catch(e) { console.error('JSON parse failed:', raw?.slice(0,300)); return null; }
}

async function finishOnboarding() {
  showLoading('Creando tu perfil...','Brenda analiza tus objetivos y calcula tus macros ideales 🍑');
  const raw    = await callClaude(profilePrompt(onboardAnswers), true);
  const parsed = safeParseJSON(raw);
  userData = {
    ...onboardAnswers,
    greeting: parsed?.greeting || `¡Hola ${onboardAnswers.name}! Lista para empezar. ¡Vamos con todo! 💪`,
    macros:   parsed?.macros   || {calories:1800,protein:130,carbs:180,fat:60},
    createdAt: new Date().toISOString(),
  };
  localStorage.setItem('brenda_user', JSON.stringify(userData));
  appData = {}; localStorage.setItem('brenda_data', JSON.stringify(appData));
  hideLoading(); initApp(); showScreen('app');
  setTimeout(generateInitialPlans, 400);
}

        <div class="brenda-avatar" style="width:44px;height:44px;font-size:20px">🍑<div class="brenda-online"></div></div>
        <div><div class="brenda-name">Brenda AI</div><div class="brenda-role">Siempre disponible para ti ✨</div></div>
      </div>
    </div>
    <div class="chat-wrap" id="chat-messages">
      <div class="chat-bubble bubble-brenda">¡Hola <strong>${u.name}</strong>! 🍑 Soy tu Brenda digital. Pregúntame sobre tu rutina, tus macros, qué comer antes de entrenar, cómo progresar... ¡lo que necesites, aquí estoy!</div>
    </div>
    <div style="padding:14px 24px 0;display:flex;gap:8px;flex-wrap:wrap" id="quick-prompts">
      ${[['¿Qué debo comer antes de entrenar?','Pre-workout 🥑'],['Dame un ejercicio extra para glúteos','Más glúteos 🍑'],['¿Cómo puedo progresar más rápido?','Progresar ⚡'],['No tuve ganas de entrenar hoy, motívame','Motivación 🔥']].map(([msg,label])=>`<button onclick="sendQuick('${msg}')" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:DM Sans,sans-serif;transition:all .2s" onmouseover="this.style.borderColor='var(--pink)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">${label}</button>`).join('')}
    </div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="Pregúntale a Brenda..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
      <button class="chat-send" onclick="sendChat()">➤</button>
    </div>
    <div style="height:8px"></div>`;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim(); if (!msg) return;
  input.value = ''; await sendMessage(msg);
}
async function sendQuick(msg) {
  const qp = document.getElementById('quick-prompts'); if (qp) qp.remove();
  await sendMessage(msg);
}
async function sendMessage(msg) {
  const wrap = document.getElementById('chat-messages'); if (!wrap) return;
  const ub = document.createElement('div'); ub.className='chat-bubble bubble-user'; ub.textContent=msg; wrap.appendChild(ub);
  const typing = document.createElement('div'); typing.className='chat-bubble bubble-brenda bubble-typing';
  typing.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrap.appendChild(typing); wrap.scrollTop = wrap.scrollHeight;
  const u = userData;
  const ctx = `Perfil: Nombre "${u.name}", objetivo "${u.goal}", nivel "${u.level}", entrena ${u.days} días en "${u.location}", ${u.weight}kg, ${u.age} años, dieta "${u.diet}". Macros: ${u.macros?.calories}kcal, proteína ${u.macros?.protein}g. Responde en español, máximo 4-5 oraciones, tono directo, motivador y cálido de Brenda.`;
  const reply = await callClaude(msg, false, ctx);
  typing.remove();
  const bb = document.createElement('div'); bb.className='chat-bubble bubble-brenda';
  bb.textContent = reply || '¡Hay un problema de conexión! Intenta de nuevo en un momento. 💪';
  wrap.appendChild(bb); wrap.scrollTop = wrap.scrollHeight;
}

// ─────────────────────────────────────────────────
// GENERATE PLANS
// ─────────────────────────────────────────────────
async function generateInitialPlans() {
  showLoading('Diseñando tu rutina...','Brenda crea tu plan de entrenamiento personalizado 💪');
  const wParsed = safeParseJSON(await callClaude(workoutPrompt(userData), true));
  if (wParsed?.weekPlan) appData.workoutPlan = wParsed;

  updateLoading('Calculando tus comidas...','Brenda prepara tu meal plan según tus macros 🥗');
  const mParsed = safeParseJSON(await callClaude(mealPrompt(userData), true));
  if (mParsed?.meals) appData.mealPlan = mParsed;

  localStorage.setItem('brenda_data', JSON.stringify(appData));
  hideLoading(); renderWorkoutTab(); renderMealsTab(); updateHomeTodayPreview();
}
async function regenerateWorkout() {
  showLoading('Nueva rutina...','Brenda diseña una variación diferente 💪');
  const p = safeParseJSON(await callClaude(workoutPrompt(userData)+'\nGenera una variación completamente diferente a la anterior.', true));
  if (p?.weekPlan) { appData.workoutPlan=p; localStorage.setItem('brenda_data',JSON.stringify(appData)); }
  hideLoading(); renderWorkoutTab(); updateHomeTodayPreview();
}
async function regenerateMeals() {
  showLoading('Nuevas comidas...','Brenda prepara un menú diferente para hoy 🥗');
  const p = safeParseJSON(await callClaude(mealPrompt(userData)+'\nGenera comidas completamente diferentes a las anteriores.', true));
  if (p?.meals) { appData.mealPlan=p; localStorage.setItem('brenda_data',JSON.stringify(appData)); }
  hideLoading(); renderMealsTab();
}
function updateHomeTodayPreview() {
  const plan = appData.workoutPlan, el = document.getElementById('home-workout-preview');
  if (!el || !plan?.weekPlan) return;
  const tn = DAYS[new Date().getDay()];
  const today = plan.weekPlan.find(d => d.day.toLowerCase().startsWith(tn.toLowerCase().slice(0,3)) || tn.toLowerCase().startsWith(d.day.toLowerCase().slice(0,3)));
  if (!today) return;
  el.innerHTML = `<div class="plan-card featured" onclick="switchTab('workout',document.querySelectorAll('.tab-item')[1])"><div class="plan-day">${today.emoji||'💪'} HOY · ${today.day}</div><div class="plan-name">${today.focus}</div><div class="plan-tags"><span class="tag">⏱ ${today.duration||'45 min'}</span><span class="tag pink">${today.intensity||'Media'}</span><span class="tag">${(today.exercises||[]).length} ejercicios</span></div>${today.tip?`<div style="font-size:12px;color:var(--muted);font-style:italic">"${today.tip}"</div>`:''}</div>`;
}

// ─────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────
function showLoading(t,m){document.getElementById('loading-title').textContent=t;document.getElementById('loading-msg').textContent=m;document.getElementById('global-loading').classList.add('active')}
function updateLoading(t,m){document.getElementById('loading-title').textContent=t;document.getElementById('loading-msg').textContent=m}
function hideLoading(){document.getElementById('global-loading').classList.remove('active')}
function showToast(msg){const t=document.getElementById('error-toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000)}

// ─────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────
if (userData) {
  initApp(); showScreen('app');
  if (!appData.workoutPlan || !appData.mealPlan) setTimeout(generateInitialPlans, 300);
  else updateHomeTodayPreview();
} else {
  showScreen('welcome');
}
</script>
</body>
</html>
