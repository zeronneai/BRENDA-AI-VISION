<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BRENDA — Tu Coach de Fitness con IA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF3C78;
  --pink2: #FF6B9D;
  --pink-dim: rgba(255,60,120,0.12);
  --gold: #E8B84B;
  --gold-dim: rgba(232,184,75,0.12);
  --dark: #080610;
  --dark2: #0F0C1A;
  --dark3: #171228;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0EBF8;
  --muted: rgba(240,235,248,0.45);
  --green: #00E5A0;
  --r: 16px;
  --r2: 24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.6;
}

/* ── GLOW ORBS ── */
.orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(80px); opacity: 0.18;
  animation: orb-drift 12s ease-in-out infinite alternate;
}
.orb-1 { width: 500px; height: 500px; background: var(--pink); top: -150px; right: -100px; animation-duration: 10s; }
.orb-2 { width: 400px; height: 400px; background: var(--gold); bottom: -100px; left: -100px; animation-duration: 14s; animation-delay: -5s; }
.orb-3 { width: 300px; height: 300px; background: #8B5CF6; top: 40%; left: 20%; animation-duration: 16s; animation-delay: -3s; opacity: 0.1; }
@keyframes orb-drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px,20px) scale(1.1); }
}

/* ── LAYOUT ── */
#app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; min-height: 100vh; padding: 0 0 40px; animation: fade-in 0.5s ease; }
.screen.active { display: flex; }
@keyframes fade-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════ ONBOARDING ═══════════════════ */
#screen-welcome {
  align-items: center; justify-content: center; text-align: center; padding: 48px 28px;
}
.welcome-eyebrow {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--pink2); margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.welcome-eyebrow::before, .welcome-eyebrow::after {
  content: ''; display: block; width: 30px; height: 1px; background: var(--pink2); opacity: 0.4;
}
.welcome-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px; font-weight: 700; line-height: 0.92; letter-spacing: -2px;
  margin-bottom: 8px;
}
.welcome-title span {
  font-style: italic;
  background: linear-gradient(135deg, var(--pink) 0%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.welcome-sub {
  font-size: 15px; color: var(--muted); line-height: 1.6; margin: 20px 0 40px;
  max-width: 300px;
}
.avatar-ring {
  width: 100px; height: 100px; border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(var(--dark2), var(--dark2)) padding-box,
              linear-gradient(135deg, var(--pink), var(--gold)) border-box;
  display: flex; align-items: center; justify-content: center;
  font-size: 44px; margin: 0 auto 28px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

/* ── ONBOARDING STEPS ── */
#screen-onboard { padding: 0; }
.onboard-header {
  padding: 52px 28px 28px;
}
.step-indicator {
  display: flex; gap: 6px; margin-bottom: 32px;
}
.step-dot {
  height: 3px; border-radius: 3px; background: var(--border2);
  transition: all 0.4s ease; flex: 1;
}
.step-dot.active { background: var(--pink); }
.step-dot.done { background: var(--green); }
.onboard-q {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 700; line-height: 1.1;
  margin-bottom: 8px;
}
.onboard-q em { font-style: italic; color: var(--pink2); }
.onboard-hint { font-size: 13px; color: var(--muted); }
.onboard-body { padding: 0 28px; flex: 1; }
.onboard-footer { padding: 24px 28px 0; }

/* Choice Cards */
.choice-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
.choice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex; align-items: center; gap: 16px;
  position: relative; overflow: hidden;
}
.choice-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--pink-dim), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.choice-card:hover { border-color: var(--border2); transform: translateX(4px); }
.choice-card.selected { border-color: var(--pink); background: var(--pink-dim); }
.choice-card.selected::before { opacity: 1; }
.choice-icon { font-size: 28px; flex-shrink: 0; }
.choice-text { flex: 1; }
.choice-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.choice-desc { font-size: 12px; color: var(--muted); }
.choice-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0;
  transition: all 0.25s;
}
.choice-card.selected .choice-check {
  background: var(--pink); border-color: var(--pink); color: white;
}

/* Slider Input */
.slider-group { margin-top: 28px; }
.slider-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px; font-weight: 700; text-align: center; line-height: 1;
  margin-bottom: 4px;
}
.slider-val span { font-size: 20px; color: var(--muted); margin-left: 4px; }
.slider-unit { text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 4px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--pink) var(--pct, 50%), var(--border2) var(--pct, 50%));
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%;
  background: white;
  box-shadow: 0 0 0 4px var(--pink-dim), 0 2px 8px rgba(0,0,0,0.4);
  transition: box-shadow 0.2s;
}
input[type=range]::-webkit-slider-thumb:hover {
  box-shadow: 0 0 0 8px var(--pink-dim), 0 2px 8px rgba(0,0,0,0.4);
}

/* Text Input */
.text-input {
  width: 100%; margin-top: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 18px; font-weight: 500;
  padding: 18px 20px;
  outline: none;
  transition: border-color 0.2s;
}
.text-input:focus { border-color: var(--pink); }
.text-input::placeholder { color: var(--muted); }

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 18px;
  border: none; border-radius: var(--r2);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.25s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--pink) 0%, #C4185B 100%);
  color: white;
  box-shadow: 0 8px 32px rgba(255,60,120,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,60,120,0.45); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, #C8922B 100%);
  color: #1A0F00;
  box-shadow: 0 8px 32px rgba(232,184,75,0.3);
}

/* ═══════════════════ MAIN APP ═══════════════════ */
#screen-app { padding: 0; }

/* TOP NAV */
.top-nav {
  padding: 52px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.nav-greeting { font-size: 12px; color: var(--muted); margin-bottom: 2px; letter-spacing: 0.5px; }
.nav-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 700;
}
.nav-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  border: 2px solid transparent;
}

/* STREAK BAR */
.streak-bar {
  margin: 0 24px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
}
.streak-fire { font-size: 32px; flex-shrink: 0; }
.streak-info { flex: 1; }
.streak-num {
  font-family: 'Space Mono', monospace;
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), #E8722B);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1;
}
.streak-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.week-dots { display: flex; gap: 5px; }
.week-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--border); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--muted); font-weight: 600;
  letter-spacing: 0px; text-transform: uppercase;
  transition: all 0.3s;
}
.week-dot.done { background: var(--pink-dim); border-color: var(--pink); color: var(--pink2); }
.week-dot.today { border-color: var(--gold); }

/* SECTION LABEL */
.sec-label {
  padding: 0 24px;
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* TAB BAR */
.tab-bar {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(8,6,16,0.92);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; z-index: 50;
  padding: 10px 0 max(10px, env(safe-area-inset-bottom));
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px; padding: 6px 0;
  cursor: pointer; transition: all 0.2s;
  color: var(--muted); font-size: 10px; letter-spacing: 0.5px;
  border: none; background: none;
}
.tab-icon { font-size: 20px; transition: transform 0.2s; }
.tab-item.active { color: var(--pink); }
.tab-item.active .tab-icon { transform: scale(1.15); }

/* CONTENT AREA */
.tab-content { display: none; padding-bottom: 90px; }
.tab-content.active { display: block; animation: fade-in 0.35s ease; }

/* ── BRENDA CHAT SECTION ── */
.brenda-hero {
  margin: 0 24px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 24px;
  position: relative; overflow: hidden;
}
.brenda-hero::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--pink), var(--gold), transparent);
}
.brenda-avatar-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.brenda-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink) 0%, var(--gold) 100%);
  display: flex; align-items: center; justify-content: center; font-size: 24px;
  flex-shrink: 0; position: relative;
}
.brenda-online {
  position: absolute; bottom: 2px; right: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--green); border: 2px solid var(--dark2);
  animation: pulse-green 2s ease-in-out infinite;
}
@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(0,229,160,0); }
}
.brenda-name { font-weight: 600; font-size: 15px; }
.brenda-role { font-size: 12px; color: var(--muted); }
.brenda-msg {
  font-size: 14px; line-height: 1.6; color: var(--muted);
  font-style: italic;
}
.brenda-msg strong { color: var(--text); font-style: normal; font-weight: 600; }

/* CHAT UI */
.chat-wrap { margin: 0 24px; display: flex; flex-direction: column; gap: 12px; }
.chat-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px; line-height: 1.6;
  animation: bubble-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes bubble-in {
  from { transform: scale(0.8) translateY(10px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.bubble-brenda {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  align-self: flex-start;
}
.bubble-user {
  background: linear-gradient(135deg, var(--pink), #C4185B);
  color: white;
  border-bottom-right-radius: 4px;
  align-self: flex-end;
}
.bubble-typing {
  display: flex; align-items: center; gap: 5px;
  padding: 14px 18px;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
  animation: typing-bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-8px); opacity: 1; }
}
.chat-input-row {
  margin: 16px 24px 0;
  display: flex; gap: 10px;
}
.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 12px 18px;
  outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--pink); }
.chat-input::placeholder { color: var(--muted); }
.chat-send {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), #C4185B);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(255,60,120,0.3);
  flex-shrink: 0;
}
.chat-send:hover { transform: scale(1.08); }
.chat-send:active { transform: scale(0.95); }

/* ── WORKOUT PLAN SECTION ── */
.plan-header { margin: 0 24px 20px; }
.plan-card {
  margin: 0 24px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative; overflow: hidden;
}
.plan-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.plan-card.featured {
  background: linear-gradient(135deg, rgba(255,60,120,0.08), rgba(232,184,75,0.05));
  border-color: rgba(255,60,120,0.25);
}
.plan-card.featured::before {
  content: 'HOY';
  position: absolute; top: 16px; right: 16px;
  background: var(--pink); color: white;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  padding: 3px 8px; border-radius: 20px;
}
.plan-day { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.plan-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 700; margin-bottom: 10px;
}
.plan-name em { font-style: italic; color: var(--pink2); }
.plan-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tag {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px; color: var(--muted);
}
.tag.pink { background: var(--pink-dim); border-color: rgba(255,60,120,0.25); color: var(--pink2); }
.tag.gold { background: var(--gold-dim); border-color: rgba(232,184,75,0.25); color: var(--gold); }
.exercise-list { display: flex; flex-direction: column; gap: 8px; }
.exercise-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--r);
}
.ex-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--pink); font-weight: 700;
  width: 20px; flex-shrink: 0;
}
.ex-info { flex: 1; }
.ex-name { font-size: 13px; font-weight: 500; }
.ex-sets { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ex-icon-r { font-size: 18px; }

/* Generate button */
.gen-btn {
  margin: 0 24px 14px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px dashed var(--border2);
  border-radius: var(--r2);
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.25s;
  color: var(--muted); font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  width: calc(100% - 48px);
  text-align: left;
}
.gen-btn:hover { border-color: var(--pink); color: var(--text); background: var(--pink-dim); }
.gen-icon { font-size: 24px; }

/* ── MEAL PLAN SECTION ── */
.meal-macros {
  margin: 0 24px 20px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.macro-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.macro-num {
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700;
  margin-bottom: 2px;
}
.macro-num.pink { color: var(--pink); }
.macro-num.gold { color: var(--gold); }
.macro-num.green { color: var(--green); }
.macro-num.blue { color: #6BBFFF; }
.macro-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
.meal-card {
  margin: 0 24px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 18px 20px;
  cursor: pointer; transition: all 0.2s;
}
.meal-card:hover { border-color: var(--border2); }
.meal-time { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.meal-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 700; margin-bottom: 8px;
}
.meal-items { font-size: 13px; color: var(--muted); line-height: 1.7; }
.meal-cals {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.meal-cals-num { font-family: 'Space Mono', monospace; font-size: 15px; color: var(--gold); font-weight: 700; }

/* ── LOADING OVERLAY ── */
#global-loading {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(8,6,16,0.96);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; text-align: center; padding: 40px;
}
#global-loading.active { display: flex; }
.loading-brenda { font-size: 60px; animation: float 2s ease-in-out infinite; }
.loading-ring {
  width: 60px; height: 60px;
  border: 3px solid var(--border2);
  border-top-color: var(--pink);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

// ══════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ══════════════════════════════════════════════════════════
const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL   = 'claude-sonnet-4-20250514';

const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let userData = JSON.parse(localStorage.getItem('brenda_user') || 'null');
let appData  = JSON.parse(localStorage.getItem('brenda_data') || '{}');
let chatHistory = [];

// ── ONBOARDING STEPS ──────────────────────────────────────
const STEPS = [

function showScreen(id) {

}

function goToOnboarding() {
  // If already onboarded, go straight to app
  if (userData) { initApp(); showScreen('app'); return; }
  currentStep = 0;
  onboardAnswers = {};
  showScreen('onboard');
  renderStep();
}

function resetApp() {
  if (!confirm('¿Reiniciar tu perfil de Brenda?')) return;
  localStorage.removeItem('brenda_user');
  localStorage.removeItem('brenda_data');
  userData = null; appData = {};
  showScreen('welcome');
}

// ══════════════════════════════════════════════════════════
// ONBOARDING
// ══════════════════════════════════════════════════════════
function buildStepIndicator() {
  const el = document.getElementById('step-indicator');
  el.innerHTML = '';
  STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    el.appendChild(d);
  });
}

function renderStep() {
  const step = STEPS[currentStep];
  buildStepIndicator();
  document.getElementById('onboard-q').innerHTML = step.q;
  document.getElementById('onboard-hint').textContent = step.hint;

  const body = document.getElementById('onboard-body');
  const nextBtn = document.getElementById('onboard-next');
  nextBtn.disabled = true;
  body.innerHTML = '';

  if (step.type === 'choice') {
    const grid = document.createElement('div');
    grid.className = 'choice-grid';
    step.options.forEach(opt => {
      const card = document.createElement('div');
      card.className = 'choice-card' + (onboardAnswers[step.key] === opt.val ? ' selected' : '');
      card.innerHTML = `
        <div class="choice-icon">${opt.icon}</div>
        <div class="choice-text">
          <div class="choice-title">${opt.title}</div>
          <div class="choice-desc">${opt.desc}</div>
        </div>
        <div class="choice-check">${onboardAnswers[step.key] === opt.val ? '✓' : ''}</div>
      `;
      card.onclick = () => {
        onboardAnswers[step.key] = opt.val;
        grid.querySelectorAll('.choice-card').forEach(c => {
          c.classList.remove('selected');
          c.querySelector('.choice-check').textContent = '';
        });
        card.classList.add('selected');
        card.querySelector('.choice-check').textContent = '✓';
        nextBtn.disabled = false;
      };
      grid.appendChild(card);
    });
    body.appendChild(grid);
    if (onboardAnswers[step.key] !== undefined) nextBtn.disabled = false;

  } else if (step.type === 'slider') {
    const val = onboardAnswers[step.key] ?? step.default;
    const pct = ((val - step.min) / (step.max - step.min)) * 100;
    body.innerHTML = `
      <div class="slider-group">
        <div class="slider-val" id="slider-display">${val}<span>${step.unit}</span></div>
        <div class="slider-unit">${step.key === 'weight' ? 'kilogramos' : 'años'}</div>
        <input type="range" id="slider-input" min="${step.min}" max="${step.max}" value="${val}"
          style="--pct:${pct}%" oninput="updateSlider(this,'${step.key}','${step.unit}',${step.min},${step.max})">
      </div>`;
    onboardAnswers[step.key] = val;
    nextBtn.disabled = false;

  } else if (step.type === 'text') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'text-input';
    inp.placeholder = step.placeholder;
    inp.value = onboardAnswers[step.key] || '';
    inp.oninput = () => {
      onboardAnswers[step.key] = inp.value.trim();
      nextBtn.disabled = !inp.value.trim();
    };
    if (onboardAnswers[step.key]) nextBtn.disabled = false;
    body.appendChild(inp);
    setTimeout(() => inp.focus(), 100);
  }
}

function updateSlider(el, key, unit, min, max) {
  const v = parseInt(el.value);
  onboardAnswers[key] = v;
  document.getElementById('slider-display').innerHTML = `${v}<span>${unit}</span>`;
  const pct = ((v - min) / (max - min)) * 100;
  el.style.setProperty('--pct', pct + '%');
}

async function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
  } else {
    // Done — generate profile with AI
    await finishOnboarding();
  }
}

async function finishOnboarding() {
  showLoading('Brenda está creando tu perfil...', 'Analizando tus objetivos y calculando tus macros ideales 🍑');

  const prompt = buildProfilePrompt(onboardAnswers);
  const result = await callClaude(prompt, true);

  if (result) {
    try {
      const clean = result.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      userData = { ...onboardAnswers, ...parsed, createdAt: new Date().toISOString() };
      localStorage.setItem('brenda_user', JSON.stringify(userData));
      appData = {};
      localStorage.setItem('brenda_data', JSON.stringify(appData));
    } catch(e) {
      userData = { ...onboardAnswers, greeting: `¡Hola ${onboardAnswers.name}! Lista para empezar.`, macros: { calories: 1800, protein: 130, carbs: 180, fat: 60 } };
      localStorage.setItem('brenda_user', JSON.stringify(userData));
    }
  } else {
    userData = { ...onboardAnswers, greeting: `¡Hola ${onboardAnswers.name}! Lista para empezar.`, macros: { calories: 1800, protein: 130, carbs: 180, fat: 60 } };
    localStorage.setItem('brenda_user', JSON.stringify(userData));
  }

  hideLoading();
  initApp();
  showScreen('app');

  setTimeout(() => generateInitialPlans(), 500);
}

// ══════════════════════════════════════════════════════════
// CLAUDE API
// ══════════════════════════════════════════════════════════
async function callClaude(userMsg, jsonMode = false, systemExtra = '') {
  const systemBase = `Eres Brenda Jazmín, una influencer fitness mexicana motivadora, directa y apasionada. 
Tu tono es cálido pero firme — exiges resultados pero con cariño. Usas expresiones mexicanas naturales ocasionalmente.
Siempre das consejos de fitness y nutrición basados en ciencia. Nunca eres condescendiente.
${jsonMode ? 'IMPORTANTE: Responde ÚNICAMENTE con JSON válido, sin texto adicional, sin markdown, sin explicaciones.' : ''}
${systemExtra}`;

  const messages = jsonMode
    ? [{ role: 'user', content: userMsg }]
    : [...chatHistory, { role: 'user', content: userMsg }];

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: MODEL, max_tokens: 1000, system: systemBase, messages })
    });
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
    if (!jsonMode) {
      chatHistory.push({ role: 'user', content: userMsg });
      chatHistory.push({ role: 'assistant', content: text });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }
    return text;
  } catch(e) {
    console.error('Claude API:', e);
    return null;
  }
}

// ══════════════════════════════════════════════════════════
// WORKOUT TAB
// ══════════════════════════════════════════════════════════
function renderWorkoutTab() {
  const tab = document.getElementById('tab-workout');
  const plan = appData.workoutPlan;

  if (!plan) {
    tab.innerHTML = `
      <div class="sec-label" style="margin-top:8px;">Tu rutina semanal</div>
      <div style="margin: 0 24px 20px; text-align:center; padding:40px 0;">
        <div style="font-size:48px;margin-bottom:16px;">💪</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;margin-bottom:8px;">Generando tu rutina...</div>
        <div style="font-size:13px;color:var(--muted);">Brenda está diseñando tu plan personalizado</div>
      </div>`;
    return;
  }

  const today = DAYS[new Date().getDay()];
  let html = `<div class="sec-label" style="margin-top:8px;">Tu rutina semanal</div>`;

  plan.weekPlan.forEach(day => {
    const isToday = day.day.toLowerCase().includes(today.toLowerCase()) ||
                    today.toLowerCase().includes(day.day.substring(0,3).toLowerCase());
    const isRest = !day.exercises || day.exercises.length === 0;

    html += `
      <div class="plan-card ${isToday ? 'featured' : ''}" onclick="this.querySelector('.exercise-list').style.display = this.querySelector('.exercise-list').style.display==='none'?'flex':'none'">
        <div class="plan-day">${day.day} ${day.emoji || ''}</div>
        <div class="plan-name">${day.focus}</div>
        <div class="plan-tags">
          ${day.duration ? `<span class="tag">⏱ ${day.duration}</span>` : ''}
          ${day.intensity ? `<span class="tag ${isToday?'pink':''}">${day.intensity}</span>` : ''}
        </div>
        ${day.tip ? `<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:12px;">"${day.tip}"</div>` : ''}
        <div class="exercise-list" style="display:${isToday?'flex':'none'};flex-direction:column;gap:8px;">
          ${(day.exercises||[]).map((ex,i) => `
            <div class="exercise-row">
              <div class="ex-num">0${i+1}</div>
              <div class="ex-info">
                <div class="ex-name">${ex.name}</div>
                <div class="ex-sets">${ex.sets} series × ${ex.reps} · descanso ${ex.rest}</div>
              </div>
              <div class="ex-icon-r">${ex.emoji || '💪'}</div>
            </div>`).join('')}
        </div>
      </div>`;
  });

  html += `
    <button class="gen-btn" onclick="regenerateWorkout()">
      <span class="gen-icon">🔄</span>
      <div>
        <div style="font-size:13px;color:var(--text);font-weight:600;margin-bottom:2px;">Regenerar con IA</div>
        <div style="font-size:11px;color:var(--muted);">Brenda crea una rutina diferente para ti</div>
      </div>
    </button>`;

  tab.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
// MEALS TAB
// ══════════════════════════════════════════════════════════
function renderMealsTab() {
  const tab = document.getElementById('tab-meals');
  const plan = appData.mealPlan;
  const u = userData;

  let macroHtml = `
    <div class="sec-label" style="margin-top:8px;">Tus macros diarios</div>
    <div class="meal-macros">
      <div class="macro-card"><div class="macro-num pink">${u?.macros?.calories||'—'}</div><div class="macro-label">kcal</div></div>
      <div class="macro-card"><div class="macro-num gold">${u?.macros?.protein||'—'}g</div><div class="macro-label">Prot</div></div>
      <div class="macro-card"><div class="macro-num green">${u?.macros?.carbs||'—'}g</div><div class="macro-label">Carbs</div></div>
      <div class="macro-card"><div class="macro-num blue">${u?.macros?.fat||'—'}g</div><div class="macro-label">Grasas</div></div>
    </div>`;

  if (!plan) {
    tab.innerHTML = macroHtml + `
      <div class="sec-label">Plan de hoy</div>
      <div style="margin: 0 24px 20px; text-align:center; padding:40px 0;">
        <div style="font-size:48px;margin-bottom:16px;">🥗</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;margin-bottom:8px;">Generando tus comidas...</div>
        <div style="font-size:13px;color:var(--muted);">Brenda está calculando tu plan perfecto</div>
      </div>`;
    return;
  }

  let mealsHtml = `<div class="sec-label">Plan de hoy</div>`;
  plan.meals.forEach(meal => {
    mealsHtml += `
      <div class="meal-card">
        <div class="meal-time">${meal.emoji || '🍽'} ${meal.time}</div>
        <div class="meal-name">${meal.name}</div>
        <div class="meal-items">${(meal.items||[]).join(' · ')}</div>
        ${meal.note ? `<div style="margin-top:8px;font-size:12px;color:var(--pink2);font-style:italic;">"${meal.note}"</div>` : ''}
        <div class="meal-cals">
          <span>Proteína: ${meal.protein||'—'}g</span>
          <span class="meal-cals-num">${meal.calories||'—'} kcal</span>
        </div>
      </div>`;
  });

  mealsHtml += `
    <button class="gen-btn" onclick="regenerateMeals()">
      <span class="gen-icon">🔄</span>
      <div>
        <div style="font-size:13px;color:var(--text);font-weight:600;margin-bottom:2px;">Nuevo plan de comidas</div>
        <div style="font-size:11px;color:var(--muted);">Brenda genera comidas diferentes para hoy</div>
      </div>
    </button>`;

  tab.innerHTML = macroHtml + mealsHtml;
}

// ══════════════════════════════════════════════════════════
// CHAT TAB
// ══════════════════════════════════════════════════════════
function renderChatTab() {
  const u = userData;
  const tab = document.getElementById('tab-chat');

  tab.innerHTML = `
    <div style="margin:8px 24px 16px;">
      <div class="brenda-avatar-row">
        <div class="brenda-avatar" style="width:44px;height:44px;font-size:20px;">🍑<div class="brenda-online"></div></div>
        <div>
          <div class="brenda-name">Brenda AI</div>
          <div class="brenda-role">Siempre disponible para ti ✨</div>
        </div>
      </div>
    </div>

    <div class="chat-wrap" id="chat-messages">
      <div class="chat-bubble bubble-brenda">
        ¡Hola <strong>${u.name}</strong>! 🍑 Soy tu Brenda digital. Pregúntame sobre tu rutina, tus macros, qué comer antes de entrenar, cómo progresar... ¡lo que necesites!
      </div>
    </div>

    <!-- Quick prompts -->
    <div style="padding:14px 24px 0; display:flex; gap:8px; flex-wrap:wrap;" id="quick-prompts">
      <button onclick="sendQuick('¿Qué debo comer antes de entrenar?')" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:DM Sans,sans-serif;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--pink)'" onmouseout="this.style.borderColor='var(--border)'">Pre-workout 🥑</button>
      <button onclick="sendQuick('Dame un ejercicio extra para glúteos que pueda hacer hoy')" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:DM Sans,sans-serif;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--pink)'" onmouseout="this.style.borderColor='var(--border)'">+Glúteos 🍑</button>
      <button onclick="sendQuick('¿Cómo puedo mejorar mi progreso más rápido?')" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:DM Sans,sans-serif;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--pink)'" onmouseout="this.style.borderColor='var(--border)'">Progresar más ⚡</button>
      <button onclick="sendQuick('No tuve ganas de entrenar hoy. ¿Qué me dices?')" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:DM Sans,sans-serif;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--pink)'" onmouseout="this.style.borderColor='var(--border)'">Motivación 🔥</button>
    </div>

    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="Pregúntale a Brenda..."
        onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">➤</button>
    </div>
    <div style="height:8px;"></div>
  `;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  await sendMessage(msg);
}

async function sendQuick(msg) {
  const qp = document.getElementById('quick-prompts');
  if (qp) qp.style.display = 'none';
  await sendMessage(msg);
}

async function sendMessage(msg) {
  const wrap = document.getElementById('chat-messages');
  if (!wrap) return;

  // User bubble
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble bubble-user';
  userBubble.textContent = msg;
  wrap.appendChild(userBubble);

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'chat-bubble bubble-brenda bubble-typing';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrap.appendChild(typing);
  wrap.scrollTop = wrap.scrollHeight;

  // Build context-aware system addition
  const u = userData;
  const context = `El perfil de la usuaria: Nombre ${u.name}, objetivo ${u.goal}, nivel ${u.level}, entrena ${u.days} días, en ${u.location}, pesa ${u.weight}kg, edad ${u.age}, dieta ${u.diet}. Macros: ${u.macros?.calories}kcal, ${u.macros?.protein}g proteína. Responde en español, en 3-5 oraciones máximo, con la personalidad de Brenda: directa, motivadora, cálida.`;

  const reply = await callClaude(msg, false, context);

  typing.remove();

  const brendaBubble = document.createElement('div');
  brendaBubble.className = 'chat-bubble bubble-brenda';
  brendaBubble.textContent = reply || '¡Claro que sí! Aunque ahorita no tengo conexión, sigue con tu plan y ya te respondo. 💪';
  wrap.appendChild(brendaBubble);
  wrap.scrollTop = wrap.scrollHeight;
}

// ══════════════════════════════════════════════════════════
// GENERATE PLANS
// ══════════════════════════════════════════════════════════
async function generateInitialPlans() {
  showLoading('Diseñando tu rutina...', 'Brenda está creando tu plan de entrenamiento personalizado 💪');
  const workoutRaw = await callClaude(buildWorkoutPrompt(userData), true);
  if (workoutRaw) {
    try {
      const clean = workoutRaw.replace(/```json|```/g, '').trim();
      appData.workoutPlan = JSON.parse(clean);
    } catch(e) {}
  }

  updateLoading('Calculando tus comidas...', 'Brenda prepara tu meal plan basado en tus macros 🥗');
  const mealRaw = await callClaude(buildMealPrompt(userData), true);
  if (mealRaw) {
    try {
      const clean = mealRaw.replace(/```json|```/g, '').trim();
      appData.mealPlan = JSON.parse(clean);
    } catch(e) {}
  }

  localStorage.setItem('brenda_data', JSON.stringify(appData));
  hideLoading();
  renderWorkoutTab();
  renderMealsTab();
  updateHomeTodayPreview();
}

async function regenerateWorkout() {
  showLoading('Nueva rutina...', 'Brenda está diseñando una variación de tu plan 💪');
  const raw = await callClaude(buildWorkoutPrompt(userData) + '\nGenera una variación diferente a la anterior.', true);
  if (raw) {
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      appData.workoutPlan = JSON.parse(clean);
      localStorage.setItem('brenda_data', JSON.stringify(appData));
    } catch(e) {}
  }
  hideLoading();
  renderWorkoutTab();
}

async function regenerateMeals() {
  showLoading('Nuevas comidas...', 'Brenda cocina un menú diferente para ti hoy 🥗');
  const raw = await callClaude(buildMealPrompt(userData) + '\nGenera comidas diferentes a las anteriores.', true);
  if (raw) {
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      appData.mealPlan = JSON.parse(clean);
      localStorage.setItem('brenda_data', JSON.stringify(appData));
    } catch(e) {}
  }
  hideLoading();
  renderMealsTab();
}

function updateHomeTodayPreview() {
  const plan = appData.workoutPlan;
  const el = document.getElementById('home-workout-preview');
  if (!el || !plan) return;
  const today = DAYS[new Date().getDay()];
  const todayPlan = plan.weekPlan?.find(d =>
    d.day.toLowerCase().includes(today.toLowerCase()) ||
    today.toLowerCase().includes(d.day.substring(0,3).toLowerCase())
  );
  if (!todayPlan) return;
  el.innerHTML = `
    <div class="plan-card featured" onclick="switchTab('workout',document.querySelectorAll('.tab-item')[1])">
      <div class="plan-day">${todayPlan.emoji || '💪'} HOY · ${todayPlan.day}</div>
      <div class="plan-name">${todayPlan.focus}</div>
      <div class="plan-tags">
        <span class="tag">${todayPlan.duration || '45 min'}</span>
        <span class="tag pink">${todayPlan.intensity || 'Media'}</span>
        <span class="tag">${(todayPlan.exercises||[]).length} ejercicios</span>
      </div>
      ${todayPlan.tip ? `<div style="font-size:12px;color:var(--muted);font-style:italic;">"${todayPlan.tip}"</div>` : ''}
    </div>`;
}

// ══════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ══════════════════════════════════════════════════════════
// LOADING
// ══════════════════════════════════════════════════════════
function showLoading(title, msg) {
  document.getElementById('loading-title').textContent = title;
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('global-loading').classList.add('active');
}
function updateLoading(title, msg) {
  document.getElementById('loading-title').textContent = title;
  document.getElementById('loading-msg').textContent = msg;
}
function hideLoading() {
  document.getElementById('global-loading').classList.remove('active');
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
if (userData) {
  initApp();
  showScreen('app');
  if (!appData.workoutPlan || !appData.mealPlan) {
    setTimeout(generateInitialPlans, 300);
  } else {
    updateHomeTodayPreview();
  }
} else {
  showScreen('welcome');
}
</script>
